<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=0.63">

    <title>Ranking</title>
    <link rel="icon" type="image/png" href="/images/puchar.png">

    <style>
        .table-wrapper {
        max-width: 1100px;
        margin: 0 auto;
        }

        /* GLOBAL TABLE STYLING (stadium theme) */
        .table {
        color: #eafff3;
        border-collapse: separate;
        border-spacing: 0 10px;
        }

        /* usuwa bootstrapowy striped look */
        .table-striped > tbody > tr {
        background: transparent !important;
        }

        .table thead th {
        background: rgba(0, 168, 89, 0.15);
        color: #eafff3;
        border: none;
        }

        /* ROW CARD EFFECT */
        .table tbody tr {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        transition: 0.2s ease;
        }

        /* hover glow */
        .table tbody tr:hover {
        background: rgba(0, 168, 89, 0.12);
        box-shadow: 0 0 15px rgba(0, 255, 120, 0.15);
        }

        /* cells */
        th, td {
        text-align: center;
        vertical-align: middle;
        border: none !important;
        padding: 14px !important;
        }

        /* flag */
        .flag {
        width: 22px;
        height: 22px;
        object-fit: cover;
        border-radius: 3px;
        }

        /* country cell */
        .country-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        @media (max-width: 1200px) {
            .country-cell {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .country-cell span {
                line-height: 1.2;
            }
        }

        /* TOP POSITIONS */
        td.gold {
        background: linear-gradient(90deg, rgba(255,215,0,0.25), rgba(0,0,0,0)) !important;
        font-weight: bold;
        }

        td.silver {
        background: linear-gradient(90deg, rgba(192,192,192,0.2), rgba(0,0,0,0)) !important;
        font-weight: bold;
        }

        td.bronze {
        background: linear-gradient(90deg, rgba(205,127,50,0.2), rgba(0,0,0,0)) !important;
        font-weight: bold;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h2 class="text-center my-4">
    <img src="/images/ranking.png"
         alt="Ranking"
         style="width:50px; height:50px; vertical-align: middle; margin-right: 8px;">
    Ranking
</h2>

<div class="table-wrapper table-responsive">

    <table class="table table-hover align-middle">

        <thead class="table-light">
        <tr>
            <th>#</th>
            <th>Użytkownik</th>
            <th>Punkty</th>
            <th>3 pkt</th>
            <th>1 pkt</th>
            <th th:if="${showWorldCupWinner}">Mistrz świata</th>
            <th th:if="${showWorldCupWinner}">MŚ pkt</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="u, stat : ${ranking}">

            <!-- miejsce (tu kolorujemy TD) -->
            <td th:class="${stat.index == 0} ? 'gold' :
                         (${stat.index == 1} ? 'silver' :
                         (${stat.index == 2} ? 'bronze' : ''))">

                <span th:switch="${stat.index}">
                    <span th:case="0">🥇</span>
                    <span th:case="1">🥈</span>
                    <span th:case="2">🥉</span>
                    <span th:case="*"
                          th:text="${stat.index + 1}">
                    </span>
                </span>

            </td>

            <td th:text="${u.firstName + ' ' + u.lastName}"></td>

            <td class="fw-bold text-primary"
                th:text="${u.totalPoints}">
            </td>

            <td th:text="${u.correct3}"></td>
            <td th:text="${u.correct1}"></td>

            <td class="country-cell" th:if="${showWorldCupWinner}">

                <img th:if="${u.worldCupWinner != null}"
                     th:src="@{'/flags/' + ${u.worldCupWinner.code} + '.png'}"
                     class="flag">

                <span th:text="${u.worldCupWinner != null ? u.worldCupWinner.name : 'brak'}"></span>

            </td>

            <td th:if="${showWorldCupWinner}"
                th:text="${u.worldCupWinnerPoints}">
            </td>

        </tr>

        </tbody>

    </table>

</div>

<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
