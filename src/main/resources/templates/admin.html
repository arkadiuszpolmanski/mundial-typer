<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=0.63">
    <title>Panel admina</title>
    <link rel="icon" type="image/png" href="/images/puchar.png">

    <style>
        .flag {
            width: 42px;
            height: 42px;
            object-fit: cover;
        }

        .team-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
        }

        .match-card {
            border-radius: 16px;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2 class="text-center mb-4">🛠 Admin panel</h2>

    <!-- ADMIN SHORTCUT CARDS -->
    <div class="row g-3 mb-4">

        <!-- REGISTER -->
        <div class="col-12 col-md-4">
            <a href="/admin/register" class="text-decoration-none">
                <div class="card shadow-sm p-3 text-center h-100 match-card">
                    <h5>
                        <img src="/images/user.png"
                             alt="User"
                             style="width:50px; height:50px; vertical-align: middle; margin-right: 8px;">
                        Rejestracja
                    </h5>
                    <p class="text-muted mb-0">Dodaj nowego użytkownika</p>
                </div>
            </a>
        </div>

        <!-- WORLD CUP -->
        <div class="col-12 col-md-4">
            <a href="/admin/world-cup-winner" class="text-decoration-none">
                <div class="card shadow-sm p-3 text-center h-100 match-card">
                    <h5>
                        <img src="/images/trofeum.png"
                             alt="Trofeum"
                             style="width:50px; height:50px; vertical-align: middle; margin-right: 8px;">
                        Mistrz świata</h5>
                    <p class="text-muted mb-0">Ustaw zwycięzcę turnieju</p>
                </div>
            </a>
        </div>

        <!-- MATCH MANAGEMENT -->
        <div class="col-12 col-md-4">
            <a href="/admin/matches" class="text-decoration-none">
                <div class="card shadow-sm p-3 text-center h-100 match-card">
                    <h5>
                        <img src="/images/mecze.png"
                             alt="Mecze"
                             style="width:50px; height:50px; vertical-align: middle; margin-right: 8px;">
                        Mecze
                    </h5>
                    <p class="text-muted mb-0">Zarządzanie meczami</p>
                </div>
            </a>
        </div>

    </div>

</div>

<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
