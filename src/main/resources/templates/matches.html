<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="viewport" content="width=device-width, initial-scale=0.61">
    <title>Mecze</title>
    <link rel="icon" type="image/png" href="/images/puchar.png">

    <style>

        .match-card {
            border-radius: 16px;
            transition: 0.2s;
        }

        .match-clickable {
            cursor: pointer;
        }

        .match-clickable:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .flag {
            width: 44px;
            height: 44px;
            object-fit: cover;
        }

        .team-name {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
        }

        .round-name {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
        }

    </style>

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h3 class="mb-4 d-flex justify-content-center align-items-center gap-2">
        <img src="/images/mecze.png"
             alt="Mecze"
             style="width:50px; height:50px; vertical-align: middle; margin-right: 8px;">
        Mecze
    </h3>

    <!-- FILTRY -->
    <div class="d-flex justify-content-center gap-2 mb-3 flex-wrap">

        <a class="btn btn-outline-primary"
           th:classappend="${type == 'all'} ? 'active'"
           href="/matches?type=all">
            Wszystkie
        </a>

        <a class="btn btn-outline-success"
           th:classappend="${type == 'active'} ? 'active'"
           href="/matches?type=active">
            Aktywne
        </a>

        <a class="btn btn-outline-danger"
           th:classappend="${type == 'live'} ? 'active'"
           href="/matches?type=live">
            Live
        </a>

        <a class="btn btn-outline-secondary"
           th:classappend="${type == 'finished'} ? 'active'"
           href="/matches?type=finished">
            Zakończone
        </a>

    </div>

    <!-- MATCH LIST -->
    <div class="row g-3">

        <div class="col-12" th:each="match : ${matches}">

            <!-- LINK CARD -->
            <a th:href="@{'/match/' + ${match.id}}"
               class="text-decoration-none text-dark d-block">

                <div class="card shadow-sm match-card p-3 match-clickable">

                    <!-- STATUS -->
                    <div class="mb-2 text-start">

                        <span class="badge bg-success"
                              th:if="${matchStatus[match.id] == 'UPCOMING'}">
                            🟢 Nadchodzące
                        </span>

                        <span class="badge bg-danger"
                              th:if="${matchStatus[match.id] == 'LIVE'}">
                            🔴 LIVE
                        </span>

                        <span class="badge bg-secondary"
                              th:if="${matchStatus[match.id] == 'FINISHED'}">
                            ⚫ Zakończony
                        </span>

                    </div>

                    <!-- TEAMS + SCORE -->
                    <div class="row align-items-center text-center w-100">

                        <!--ROUND-->
                        <div class="round-name text-truncate">
                            <span th:text="${match.round.label}"></span>
                        </div>

                        <!-- HOME -->
                        <div class="col-5 d-flex flex-column align-items-center">
                            <img th:src="@{'/flags/' + ${match.homeTeam.code} + '.png'}"
                                 class="flag mb-1">

                            <div class="team-name text-truncate w-100"
                                 th:text="${match.homeTeam.name}">
                            </div>
                        </div>

                        <!-- CENTER COLUMN -->
                        <div class="col-2 d-flex flex-column justify-content-center align-items-center">

                            <!-- SCORE -->
                            <div class="fw-bold fs-5">
                                <span th:if="${match.homeScore != null}">
                                    <span th:text="${match.homeScore}"></span>
                                    -
                                    <span th:text="${match.awayScore}"></span>
                                </span>

                                <span th:if="${match.homeScore == null}" class="text-muted">
                                    VS
                                </span>
                            </div>

                        </div>

                        <!-- AWAY -->
                        <div class="col-5 d-flex flex-column align-items-center">

                            <img th:src="@{'/flags/' + ${match.awayTeam.code} + '.png'}"
                                 class="flag mb-1">

                            <div class="team-name text-truncate w-100"
                                 th:text="${match.awayTeam.name}">
                            </div>

                        </div>

                        <!-- TIME -->
                        <div class="text-muted small mt-1">
                            <span th:text="${#temporals.format(match.matchTime, 'HH:mm dd.MM.yyyy')}"></span>
                        </div>

                        <!-- PREDICTION -->
                        <div class="text-muted small mt-1">

                                <span th:if="${userPredictions[match.id] != null}"
                                      class="badge bg-success fs-6 px-3 py-2">

                                    Twój typ:
                                    <span class="ms-1 fw-bold">
                                        <span th:text="${userPredictions[match.id].predictedHome}"></span>
                                        -
                                        <span th:text="${userPredictions[match.id].predictedAway}"></span>
                                    </span>

                                </span>

                            <span th:if="${userPredictions[match.id] == null}"
                                  class="badge bg-danger fs-6 px-3 py-2">
                                    Brak typu
                            </span>

                        </div>

                    </div>

                </div>

            </a>

        </div>

    </div>

</div>

<script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
