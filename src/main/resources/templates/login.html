<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Logowanie</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logowanie</title>
    <link rel="icon" type="image/png" href="/images/puchar.png">
    <style>
        .login-card p {
            color: #004B2D !important;
            font-weight: 500;
        }

        .login-page {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-page::before {
            content: "";
            position: absolute;
            inset: 0;

            background: url('/images/tlo.jpg');
            background-size: cover;
            background-position: center;

            opacity: 1;
            filter: blur(1px);
            z-index: 0;
        }

        .login-page::after {
            content: "";
            position: absolute;
            inset: 0;

            background: linear-gradient(
                rgba(0, 75, 45, 0.92),
                rgba(0, 168, 89, 0.88)
            );

            z-index: 1;
        }

        .login-overlay {
            position: relative;
            z-index: 2;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;

            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            text-align: center;
        }

        .login-card input {
            margin-bottom: 12px;
        }

        .login-btn {
            width: 100%;
        }

        /* 📱 MOBILE OPTIMIZATION */
        @media (max-width: 1200px) {
            .login-card {
                max-width: 95%;
                padding: 20px;
                border-radius: 12px;
            }

            .login-card h1 {
                font-size: 22px;
            }

            .login-card img {
                width: 42px !important;
                height: 42px !important;
            }

            .login-card p {
                font-size: 14px;
            }

            .form-control {
                font-size: 16px;
                padding: 10px;
            }

            .login-btn {
                padding: 10px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body class="login-page">

<div class="login-overlay">

    <div class="login-card">

        <h1>
            <img src="/images/puchar.png"
                 alt="Puchar"
                 style="width:55px; height:55px; vertical-align: middle; margin-right: 8px;">
            Mundial Typer
        </h1>

        <p>MŚ 2026 • Meksyk • USA • Kanada</p>

        <form method="post" action="/login">

            <input
                    class="form-control"
                    name="username"
                    placeholder="Nazwa użytkownika">

            <input
                    class="form-control"
                    type="password"
                    name="password"
                    placeholder="Hasło">

            <div th:if="${param.error != null}"
                 class="alert alert-danger text-center mx-auto"
                 style="max-width: 500px;">

                ❌ Nieprawidłowa nazwa użytkownika lub hasło
            </div>

            <button
                    class="btn btn-success login-btn">
                Zaloguj się
            </button>

        </form>

    </div>

</div>

</body>
